services:
  - type: web
    name: financas-casal
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DB_PATH
        value: /data/financas.db
    disk:
      name: financas-db
      mountPath: /data
      sizeGB: 1
